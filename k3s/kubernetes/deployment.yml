# =============================================================
#  HealthPulse Portal — Kubernetes Deployment
#  Students deploy this to their K8s namespaces
# =============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthpulse-portal
  namespace: healthpulse-prod    # Change per environment
  labels:
    app: healthpulse
    version: latest
spec:
  replicas: 2
  selector:
    matchLabels:
      app: healthpulse
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: healthpulse
        version: latest
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "80"
        prometheus.io/path: "/health"
    spec:
      containers:
        - name: healthpulse
          image: ARTIFACTORY_REGISTRY/healthpulse-portal:VERSION_TAG
          ports:
            - containerPort: 80
              protocol: TCP
          env:
            - name: APP_VERSION
              value: "VERSION_TAG"
            - name: ENVIRONMENT
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      imagePullSecrets:
        - name: artifactory-pull-secret
